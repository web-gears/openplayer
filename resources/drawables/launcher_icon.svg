<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Official Jellyfin Dark Background -->
  <circle cx="20" cy="20" r="20" fill="#000B25" />
  
  <defs>
    <!-- Official Jellyfin Gradient -->
    <linearGradient id="jellyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#AA5CC3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A4DC;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle Inner Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- The "Inner Glow" Gradient Ring -->
  <circle cx="20" cy="20" r="17" fill="none" stroke="url(#jellyGrad)" stroke-width="1.5" opacity="0.6" />

  <!-- Stylized Play/Server Hub Symbol -->
  <path d="M16 13 L16 27 L27 20 Z" fill="url(#jellyGrad)" filter="url(#glow)" />
  
  <!-- Subtle Dot Details (Network/Server node feel) -->
  <circle cx="16" cy="13" r="1.2" fill="white" opacity="0.8" />
  <circle cx="16" cy="27" r="1.2" fill="white" opacity="0.8" />
  <circle cx="27" cy="20" r="1.2" fill="white" opacity="0.8" />
</svg>
